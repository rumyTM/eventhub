name: Orders
description: ''
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/orders
    metadata:
      custom: []
      groupName: Orders
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'List orders'
      description: |-
        Returns a paginated list of orders. Attendees see only their own orders;
        admins see all orders and can filter by status (e.g. for the dispute queue).
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_BEARER_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      status:
        custom: []
        name: status
        description: 'Filter orders by status. Attendees always see only their own orders; admins may use this to narrow the result set.'
        required: false
        example: paid
        type: string
        enumValues:
          - pending
          - paid
          - partially_refunded
          - refunded
          - expired
          - failed
          - cancelled
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Number of items per page (1–100). Must be at least 1. Must not be greater than 100.'
        required: false
        example: 15
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanQueryParameters:
      status: paid
      per_page: 15
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"success":true,"message":"Orders retrieved.","data":{"orders":[{"id":"01J000000000000DEMOORDER1","status":{"value":"paid","label":"Paid"},"total":75000,"currency":"BDT","commission_rate":"0.1000","created_at":"2026-06-30T10:05:00Z"}],"pagination":{"current_page":1,"per_page":15,"total":1,"last_page":1}},"errors":null}'
