      groupName: Payouts
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Preview next payout (vendor)'
      description: |-
        Returns the estimated payout breakdown without creating anything. Returns null data when
        there are no eligible settled orders or the balance is below the minimum threshold.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_BEARER_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
