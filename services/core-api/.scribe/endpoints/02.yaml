name: Payouts
description: ''
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/payouts
    metadata:
      custom: []
      groupName: Payouts
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'My payouts (vendor)'
      description: |-
        Paginated list of the authenticated vendor's own payouts, newest first.
        Optionally filter by `status`.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_BEARER_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      status:
        custom: []
        name: status
        description: 'Filter by payout status.'
        required: false
        example: pending
        type: string
        enumValues:
          - pending
          - approved
          - processing
          - paid
          - failed
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      vendor_id:
        custom: []
        name: vendor_id
        description: 'Filter by vendor (admin only). Must not be greater than 26 characters.'
        required: false
        example: no-example
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Items per page (1–100). Must be at least 1. Must not be greater than 100.'
        required: false
        example: 20
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanQueryParameters:
      status: pending
      vendor_id: no-example
      per_page: 20
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
