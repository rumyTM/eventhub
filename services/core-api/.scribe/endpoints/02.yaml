        custom: []
        status: 401
        content: '{"success":false,"message":"Unauthenticated.","data":null,"errors":null}'
        headers: []
        description: Unauthenticated
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
