  '/api/v1/events/{event_id}/ticket-types':
    post:
      summary: 'Create ticket type'
      operationId: createTicketType
      description: "Add a ticket type (general, VIP, early-bird, or group-bundle) to the vendor's own event."
      parameters: []
      responses: {}
      tags:
        - 'Ticket Types'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  description: ''
                  example: early_bird
                  enum:
                    - early_bird
                    - vip
                    - general
                price:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 27
                currency:
                  type: string
                  description: 'Must be 3 characters.'
                  example: ngz
                quantity_total:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 27
                group_size:
                  type: integer
                  description: 'Must be at least 2.'
                  example: 18
                  nullable: true
                group_discount:
                  type: number
                  description: 'This field is required when <code>group_size</code> is present. Must be at least 0.'
                  example: 76
                  nullable: true
                sales_start:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-06-30T07:48:08'
                  nullable: true
                sales_end:
                  type: string
                  description: 'Must be a valid date. Must be a date after <code>sales_start</code>.'
                  example: '2052-07-23'
                  nullable: true
              required:
                - kind
                - price
                - currency
                - quantity_total
    parameters:
      -
        in: path
        name: event_id
        description: 'The ID of the event.'
        example: architecto
        required: true
        schema:
          type: string
