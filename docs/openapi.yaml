      description: "Submit or re-submit the authenticated vendor's KYC documents for admin review.\nKYC status transitions: `pending → verified` (admin approves) or `pending → rejected`.\nOnly `pending` and `rejected` vendors may re-submit."
      parameters: []
      responses: {}
      tags:
        - 'Vendors / KYC'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  type: array
                  description: 'Must have at least 1 items.'
                  example:
                    - []
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: ''
                        example: trade_license
                        enum:
                          - trade_license
                          - nid
                          - bank_statement
                      storage_path:
                        type: string
                        description: 'Must not be greater than 1024 characters.'
                        example: b
                    required:
                      - type
                      - storage_path
              required:
                - documents
