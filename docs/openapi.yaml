openapi: 3.0.3
info:
  title: 'EventHub Core API'
  description: 'REST API for the EventHub multi-vendor event ticketing and payout platform. Vendors create events and sell tickets; attendees browse and buy; admins approve vendors, manage refunds, and disburse payouts. Every financial operation is auditable, idempotent, and resilient to partial failure.'
  version: 1.0.0
servers:
  - url: 'http://localhost:8000'
tags:
  - name: Public
    description: ''
  - name: Auth
    description: ''
  - name: Vendor
    description: ''
  - name: Attendee
    description: ''
  - name: Admin
    description: ''
  - name: Orders
    description: ''
  - name: Payouts
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via **POST /api/v1/auth/login**. Include it in every authenticated request: `Authorization: Bearer {token}`.'
security:
  -
    default: []
paths:
  /api/v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: "Create a new vendor or attendee account. Returns a Sanctum bearer token on success.\nAdmin accounts are provisioned via seeder only — the `admin` role is not self-assignable."
      parameters: []
      responses:
        201:
          description: 'Vendor registered'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Account created successfully.'
                  data:
                    user:
                      id: 01J0000000000000000VENDOR
                      name: 'Acme Events Ltd'
                      email: vendor@eventhub.test
                      role:
                        value: vendor
                        label: Vendor
                      created_at: '2026-06-30T10:00:00Z'
                    token: '[PLACEHOLDER_TOKEN]'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Account created successfully.'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 01J0000000000000000VENDOR
                          name:
                            type: string
                            example: 'Acme Events Ltd'
                          email:
                            type: string
                            example: vendor@eventhub.test
                          role:
                            type: object
                            properties:
                              value:
                                type: string
                                example: vendor
                              label:
                                type: string
                                example: Vendor
                          created_at:
                            type: string
                            example: '2026-06-30T10:00:00Z'
                      token:
                        type: string
                        example: '[PLACEHOLDER_TOKEN]'
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name.'
                  example: 'Alice Smith'
                email:
                  type: string
                  description: 'Email address.'
                  example: alice@example.com
                password:
                  type: string
                  description: 'Min 8 characters.'
                  example: password123
                role:
                  type: string
                  description: '`vendor` or `attendee`.'
                  example: vendor
                business_name:
                  type: string
                  description: 'if role is vendor.'
                  example: 'Acme Events Ltd'
                  nullable: true
                phone:
                  type: string
                  description: 'optional Attendee contact phone.'
                  example: '+8801711000000'
                  nullable: true
                password_confirmation:
                  type: string
                  description: 'Must match password.'
                  example: password123
              required:
                - name
                - email
                - password
                - role
                - business_name
                - password_confirmation
      security: []
  /api/v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: "Authenticate and receive a Sanctum bearer token. Use the returned token in an\n`Authorization: Bearer {token}` header on subsequent requests."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Logged in successfully.'
                  data:
                    user:
                      id: 01J0000000000000000VENDOR
                      name: 'Acme Events Ltd'
                      email: vendor@eventhub.test
                      role:
                        value: vendor
                        label: Vendor
                      created_at: '2026-06-30T10:00:00Z'
                    token: '[PLACEHOLDER_TOKEN]'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Logged in successfully.'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 01J0000000000000000VENDOR
                          name:
                            type: string
                            example: 'Acme Events Ltd'
                          email:
                            type: string
                            example: vendor@eventhub.test
                          role:
                            type: object
                            properties:
                              value:
                                type: string
                                example: vendor
                              label:
                                type: string
                                example: Vendor
                          created_at:
                            type: string
                            example: '2026-06-30T10:00:00Z'
                      token:
                        type: string
                        example: '[PLACEHOLDER_TOKEN]'
                  errors:
                    type: string
                    example: null
                    nullable: true
        401:
          description: 'Bad credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'The provided credentials are incorrect.'
                  data: null
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'The provided credentials are incorrect.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: vendor@eventhub.test
                password:
                  type: string
                  description: ''
                  example: password
              required:
                - email
                - password
      security: []
  /api/v1/events:
    get:
      summary: 'List events'
      operationId: listEvents
      description: "Returns published events for unauthenticated callers. Vendors additionally see their own\ndraft/ongoing events; admins see all events regardless of status."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Events retrieved.'
                  data:
                    events:
                      -
                        id: 01JWXYZ0000000000000EVENT1
                        vendor_id: 01JWXYZ0000000000000VENDOR
                        title: 'Summer Music Festival 2026'
                        description: 'An evening of live music at the Dhaka Convention Centre.'
                        timezone: Asia/Dhaka
                        starts_at: '2026-09-20T12:00:00+00:00'
                        ends_at: '2026-09-20T16:00:00+00:00'
                        capacity: 500
                        status:
                          value: published
                          label: Published
                        ticket_types: []
                        created_at: '2026-06-30T09:00:00+00:00'
                        updated_at: '2026-06-30T09:00:00+00:00'
                    pagination:
                      current_page: 1
                      per_page: 15
                      total: 1
                      last_page: 1
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Events retrieved.'
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        example:
                          -
                            id: 01JWXYZ0000000000000EVENT1
                            vendor_id: 01JWXYZ0000000000000VENDOR
                            title: 'Summer Music Festival 2026'
                            description: 'An evening of live music at the Dhaka Convention Centre.'
                            timezone: Asia/Dhaka
                            starts_at: '2026-09-20T12:00:00+00:00'
                            ends_at: '2026-09-20T16:00:00+00:00'
                            capacity: 500
                            status:
                              value: published
                              label: Published
                            ticket_types: []
                            created_at: '2026-06-30T09:00:00+00:00'
                            updated_at: '2026-06-30T09:00:00+00:00'
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: 01JWXYZ0000000000000EVENT1
                            vendor_id:
                              type: string
                              example: 01JWXYZ0000000000000VENDOR
                            title:
                              type: string
                              example: 'Summer Music Festival 2026'
                            description:
                              type: string
                              example: 'An evening of live music at the Dhaka Convention Centre.'
                            timezone:
                              type: string
                              example: Asia/Dhaka
                            starts_at:
                              type: string
                              example: '2026-09-20T12:00:00+00:00'
                            ends_at:
                              type: string
                              example: '2026-09-20T16:00:00+00:00'
                            capacity:
                              type: integer
                              example: 500
                            status:
                              type: object
                              properties:
                                value:
                                  type: string
                                  example: published
                                label:
                                  type: string
                                  example: Published
                            ticket_types:
                              type: array
                              example: []
                            created_at:
                              type: string
                              example: '2026-06-30T09:00:00+00:00'
                            updated_at:
                              type: string
                              example: '2026-06-30T09:00:00+00:00'
                      pagination:
                        type: object
                        properties:
                          current_page:
                            type: integer
                            example: 1
                          per_page:
                            type: integer
                            example: 15
                          total:
                            type: integer
                            example: 1
                          last_page:
                            type: integer
                            example: 1
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Public
      security: []
    post:
      summary: 'Create event'
      operationId: createEvent
      description: "Create a new event draft owned by the authenticated vendor.\nThe vendor must be KYC-verified before the event can be published."
      parameters: []
      responses: {}
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'Summer Music Festival 2026'
                description:
                  type: string
                  description: 'Must not be greater than 5000 characters.'
                  example: 'An evening of live music at the Dhaka Convention Centre.'
