openapi: 3.0.3
info:
  title: 'EventHub Core API'
  description: 'REST API for the EventHub multi-vendor event ticketing and payout platform. Vendors create events and sell tickets; attendees browse and buy; admins approve vendors, manage refunds, and disburse payouts. Every financial operation is auditable, idempotent, and resilient to partial failure.'
  version: 1.0.0
servers:
  - url: 'http://localhost'
tags:
  - name: Auth
    description: "\nRegister, log in, and manage the current session."
  - name: Events
    description: "\nBrowse the event catalog and manage vendor events.\nPublic read endpoints require no authentication. Write endpoints require a `vendor` role token."
  - name: 'Ticket Types'
    description: "\nManage ticket types for an event. Public reads; vendor-role writes (own events only)."
  - name: 'Orders / Checkout'
    description: "\nAttendee ticket checkout. Creates a 15-minute inventory hold and initiates payment."
  - name: Refunds
    description: "\nRequest and manage order refunds. Amount is always **policy-derived** — attendees never specify\na sum. Time-based policy: >48 h before event start → 100%; 24–48 h → 50%; <24 h → 0%."
  - name: 'Vendors / KYC'
    description: "\nVendor onboarding and KYC (Know Your Customer) review. Vendors must be KYC-verified\nbefore they can publish events or receive payouts."
  - name: Payouts
    description: "\nAdmin payout management. Payouts are calculated per-vendor after their events complete.\nNet = gross_sales − (gross × commission_rate). A minimum threshold is enforced; below it the\npayout rolls to the next cycle. Execution is asynchronous — the terminal result arrives via\nthe payment-service webhook.\n\nGET  /admin/payouts               — paginated list (filterable by status/vendor).\nPOST /admin/payouts/build         — calculate pending settlements (decide-only; no money moves).\nPOST /admin/payouts/{payout}/execute — dispatch payment to the vendor."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via **POST /api/v1/auth/login**. Include it in every authenticated request: `Authorization: Bearer {token}`.'
security:
  -
    default: []
paths:
  /api/v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: "Create a new vendor or attendee account. Returns a Sanctum bearer token on success.\nAdmin accounts are provisioned via seeder only — the `admin` role is not self-assignable."
      parameters: []
      responses:
        201:
          description: 'Vendor registered'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Account created successfully.'
                  data:
                    user:
                      id: 01J0000000000000000VENDOR
                      name: 'Acme Events Ltd'
                      email: vendor@eventhub.test
                      role:
                        value: vendor
                        label: Vendor
                      created_at: '2026-06-30T10:00:00Z'
                    token: '[PLACEHOLDER_TOKEN]'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Account created successfully.'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 01J0000000000000000VENDOR
                          name:
                            type: string
                            example: 'Acme Events Ltd'
                          email:
                            type: string
                            example: vendor@eventhub.test
                          role:
                            type: object
                            properties:
                              value:
                                type: string
                                example: vendor
                              label:
                                type: string
                                example: Vendor
                          created_at:
                            type: string
                            example: '2026-06-30T10:00:00Z'
                      token:
                        type: string
                        example: '[PLACEHOLDER_TOKEN]'
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name.'
                  example: 'Alice Smith'
                email:
                  type: string
                  description: 'Email address.'
                  example: alice@example.com
                password:
                  type: string
                  description: 'Min 8 characters.'
                  example: password123
                role:
                  type: string
                  description: '`vendor` or `attendee`.'
                  example: vendor
                business_name:
                  type: string
                  description: 'if role is vendor.'
                  example: 'Acme Events Ltd'
                  nullable: true
                phone:
                  type: string
                  description: 'optional Attendee contact phone.'
                  example: '+8801711000000'
                  nullable: true
                password_confirmation:
                  type: string
                  description: 'Must match password.'
                  example: password123
              required:
                - name
                - email
                - password
                - role
                - business_name
                - password_confirmation
      security: []
  /api/v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: "Authenticate and receive a Sanctum bearer token. Use the returned token in an\n`Authorization: Bearer {token}` header on subsequent requests."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Logged in successfully.'
                  data:
                    user:
                      id: 01J0000000000000000VENDOR
                      name: 'Acme Events Ltd'
                      email: vendor@eventhub.test
                      role:
                        value: vendor
                        label: Vendor
                      created_at: '2026-06-30T10:00:00Z'
                    token: '[PLACEHOLDER_TOKEN]'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Logged in successfully.'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 01J0000000000000000VENDOR
                          name:
                            type: string
                            example: 'Acme Events Ltd'
                          email:
                            type: string
                            example: vendor@eventhub.test
                          role:
                            type: object
                            properties:
                              value:
                                type: string
                                example: vendor
                              label:
                                type: string
                                example: Vendor
                          created_at:
                            type: string
                            example: '2026-06-30T10:00:00Z'
                      token:
                        type: string
                        example: '[PLACEHOLDER_TOKEN]'
                  errors:
                    type: string
                    example: null
                    nullable: true
        401:
          description: 'Bad credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'The provided credentials are incorrect.'
                  data: null
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'The provided credentials are incorrect.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum token. The token becomes immediately invalid.'
      parameters: []
      responses: {}
      tags:
        - Auth
  /api/v1/events:
    post:
      summary: 'Create event'
      operationId: createEvent
      description: "Create a new event draft owned by the authenticated vendor.\nThe vendor must be KYC-verified before the event can be published."
