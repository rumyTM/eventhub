  '/api/v1/events/{id}':
    get:
      summary: 'Get event'
      operationId: getEvent
      description: "Retrieve a single event with its ticket types. Published events are public;\ndraft/cancelled events are visible only to their owner vendor or an admin."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Event retrieved.'
                  data:
                    event:
                      id: 01JWXYZ0000000000000EVENT1
                      vendor_id: 01JWXYZ0000000000000VENDOR
                      title: 'Summer Music Festival 2026'
                      description: 'An evening of live music at the Dhaka Convention Centre.'
                      timezone: Asia/Dhaka
                      starts_at: '2026-09-20T12:00:00+00:00'
                      ends_at: '2026-09-20T16:00:00+00:00'
                      capacity: 500
                      status:
                        value: published
                        label: Published
                      ticket_types:
                        -
                          id: 01JWXYZ000000000000TICKET1
                          event_id: 01JWXYZ0000000000000EVENT1
                          kind:
                            value: general
                            label: General
                          price: 50000
                          currency: BDT
                          quantity_total: 200
                          quantity_sold: 12
                          group_size: null
                          group_discount: null
                          sales_start: '2026-08-01T00:00:00+06:00'
                          sales_end: '2026-09-19T23:59:59+06:00'
