  /api/v1/admin/payouts/build:
    post:
      summary: 'Build payout batch (admin)'
      operationId: buildPayoutBatchadmin
      description: "Calculate pending settlements for all eligible vendors (or a single vendor if `vendor_id`\nis provided). This is a **decide-only** step — it creates `Payout` records but moves no money.\nCall `/admin/payouts/{payout}/execute` to actually disburse. Idempotent per `batch_id`."
      parameters: []
      responses:
        201:
          description: 'Batch built'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: '1 payout(s) built.'
                  data:
                    batch_id: '2026-06-30'
                    count: 1
                    payouts:
                      -
                        id: 01J000000000000DEMOPAYOUT
                        vendor_id: 01J000000000000DEMOVENDOR
                        gross: 500000
                        commission: 50000
                        net: 450000
                        currency: BDT
                        status:
                          value: pending
                          label: Pending
                        batch_id: '2026-06-30'
                        created_at: '2026-06-30T09:00:00Z'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: '1 payout(s) built.'
                  data:
                    type: object
                    properties:
                      batch_id:
                        type: string
                        example: '2026-06-30'
                      count:
                        type: integer
                        example: 1
                      payouts:
                        type: array
                        example:
                          -
                            id: 01J000000000000DEMOPAYOUT
                            vendor_id: 01J000000000000DEMOVENDOR
                            gross: 500000
                            commission: 50000
                            net: 450000
                            currency: BDT
                            status:
                              value: pending
                              label: Pending
                            batch_id: '2026-06-30'
                            created_at: '2026-06-30T09:00:00Z'
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: 01J000000000000DEMOPAYOUT
                            vendor_id:
                              type: string
                              example: 01J000000000000DEMOVENDOR
                            gross:
                              type: integer
                              example: 500000
                            commission:
                              type: integer
                              example: 50000
                            net:
                              type: integer
                              example: 450000
                            currency:
                              type: string
                              example: BDT
                            status:
                              type: object
                              properties:
                                value:
                                  type: string
                                  example: pending
                                label:
                                  type: string
                                  example: Pending
                            batch_id:
                              type: string
                              example: '2026-06-30'
                            created_at:
                              type: string
                              example: '2026-06-30T09:00:00Z'
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Payouts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vendor_id:
                  type: string
                  description: 'Must match an existing stored value. Must not be greater than 26 characters.'
                  example: b
                batch_id:
                  type: string
                  description: 'Must not be greater than 64 characters.'
                  example: 'n'
  '/api/v1/admin/payouts/{payout_id}/execute':
    post:
      summary: 'Execute payout'
      operationId: executePayout
      description: "Dispatch payment for a `pending` or `approved` payout. The job transitions the payout to\n`processing` and calls payment-service; the terminal result (`paid` or `failed`) arrives\nvia the signed payment-service webhook. Idempotent — re-dispatching the same payout\nreuses the deterministic idempotency key."
      parameters: []
      responses:
        200:
          description: Queued
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Payout execution queued.'
                  data:
                    payout:
                      id: 01J000000000000DEMOPAYOUT
                      vendor_id: 01J000000000000DEMOVENDOR
                      gross: 500000
                      commission: 50000
                      net: 450000
                      currency: BDT
                      status:
                        value: pending
                        label: Pending
                      batch_id: 01J0BATCHID
                      created_at: '2026-06-30T09:00:00Z'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Payout execution queued.'
                  data:
                    type: object
                    properties:
                      payout:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 01J000000000000DEMOPAYOUT
                          vendor_id:
                            type: string
                            example: 01J000000000000DEMOVENDOR
                          gross:
                            type: integer
                            example: 500000
                          commission:
                            type: integer
                            example: 50000
                          net:
                            type: integer
                            example: 450000
                          currency:
                            type: string
                            example: BDT
                          status:
                            type: object
                            properties:
                              value:
                                type: string
                                example: pending
                              label:
                                type: string
                                example: Pending
                          batch_id:
                            type: string
                            example: 01J0BATCHID
                          created_at:
                            type: string
                            example: '2026-06-30T09:00:00Z'
                  errors:
                    type: string
                    example: null
                    nullable: true
        409:
          description: 'Not executable'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'This payout cannot be executed in its current status.'
                  data: null
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'This payout cannot be executed in its current status.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Payouts
    parameters:
      -
        in: path
        name: payout_id
        description: 'The ID of the payout.'
        example: architecto
        required: true
        schema:
          type: string
