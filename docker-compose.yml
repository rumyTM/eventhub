# EventHub — full stack. `cp .env.example .env`, fill secrets, then `docker compose up -d --build`.
#
# Services are brought up incrementally as they are scaffolded:
#   Default profile  → mysql · redis · core-api (+ worker + scheduler) · payment-service  (all implemented)
#   --profile full   → adds notification-service and frontend  (scaffold them first — each needs a Dockerfile)
#
# Secrets come from .env only; never commit real values.

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      # create all three service databases on first boot
      MYSQL_DATABASE: ${CORE_DB_DATABASE}
    ports:
      # Host port is configurable to avoid clashing with a local MySQL (e.g. Laragon on 3306).
      # Inter-container traffic always uses mysql:3306 on the compose network, regardless of this mapping.
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro   # init.sql creates payments + notifications DBs
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  core-api:
    build: ./services/core-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      APP_KEY: ${CORE_APP_KEY}
      DB_CONNECTION: mysql
      APP_PORT: 8000
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      DB_HOST: mysql
      DB_DATABASE: ${CORE_DB_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      PAYMENT_SERVICE_URL: http://payment-service:8001
      PAYMENT_SERVICE_TOKEN: ${PAYMENT_SERVICE_TOKEN}
      NOTIFICATION_QUEUE_REDIS: redis://redis:6379
      CORE_API_BEARER_TOKEN: ${CORE_API_BEARER_TOKEN}   # verifies inbound payment webhooks
      CORE_API_WEBHOOK_SECRET: ${CORE_API_WEBHOOK_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  core-api-worker:        # queue worker (notification publish, payment calls)
    build: ./services/core-api
    command: php artisan queue:work --tries=3 --verbose
    env_file: .env
    environment:
      APP_KEY: ${CORE_APP_KEY}
      DB_CONNECTION: mysql
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      DB_HOST: mysql
      DB_DATABASE: ${CORE_DB_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      PAYMENT_SERVICE_URL: http://payment-service:8001
      PAYMENT_SERVICE_TOKEN: ${PAYMENT_SERVICE_TOKEN}
      CORE_API_BEARER_TOKEN: ${CORE_API_BEARER_TOKEN}
      CORE_API_WEBHOOK_SECRET: ${CORE_API_WEBHOOK_SECRET}
    depends_on:
      core-api: { condition: service_started }

  payment-service-worker:   # queue worker — resolves charges and delivers signed webhooks to core-api
    build: ./services/payment-service
    command: php artisan queue:work --tries=5 --verbose
    env_file: .env
    environment:
      APP_KEY: ${PAYMENTS_APP_KEY}
      DB_CONNECTION: mysql
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      DB_HOST: mysql
      DB_DATABASE: ${PAYMENTS_DB_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      PAYMENT_SERVICE_TOKEN: ${PAYMENT_SERVICE_TOKEN}
      CORE_API_BEARER_TOKEN: ${CORE_API_BEARER_TOKEN}
      CORE_API_WEBHOOK_SECRET: ${CORE_API_WEBHOOK_SECRET}
      CORE_API_WEBHOOK_URL: ${CORE_API_WEBHOOK_URL}
      CORE_API_REFUND_WEBHOOK_URL: ${CORE_API_REFUND_WEBHOOK_URL}
      CORE_API_PAYOUT_WEBHOOK_URL: ${CORE_API_PAYOUT_WEBHOOK_URL}
    depends_on:
      payment-service: { condition: service_started }

  core-api-scheduler:     # cron: ReleaseExpiredHolds, payout batch, reminders, reports, waitlist
    build: ./services/core-api
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file: .env
    environment:
      APP_KEY: ${CORE_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: ${CORE_DB_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      core-api: { condition: service_started }

  payment-service:
    build: ./services/payment-service
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      APP_KEY: ${PAYMENTS_APP_KEY}
      DB_CONNECTION: mysql
      APP_PORT: 8001
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      DB_HOST: mysql
      DB_DATABASE: ${PAYMENTS_DB_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      PAYMENT_SERVICE_TOKEN: ${PAYMENT_SERVICE_TOKEN}
      CORE_API_URL: http://core-api:8000
      CORE_API_BEARER_TOKEN: ${CORE_API_BEARER_TOKEN}
      CORE_API_WEBHOOK_SECRET: ${CORE_API_WEBHOOK_SECRET}
      CORE_API_WEBHOOK_URL: ${CORE_API_WEBHOOK_URL}
      CORE_API_REFUND_WEBHOOK_URL: ${CORE_API_REFUND_WEBHOOK_URL}
      CORE_API_PAYOUT_WEBHOOK_URL: ${CORE_API_PAYOUT_WEBHOOK_URL}
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  notification-service:
    build: ./services/notification-service   # scaffold this service first (`/scaffold-service notification-service`)
    profiles: [full]
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      PORT: 8002
      REDIS_URL: redis://redis:6379
      DB_HOST: mysql
      DB_DATABASE: ${NOTIFICATIONS_DB_DATABASE}
      VENDOR_WEBHOOK_SECRET: ${VENDOR_WEBHOOK_SECRET}
    depends_on:
      redis: { condition: service_healthy }
      mysql: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are baked at build time — must be the browser-reachable address
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    profiles: [full]
    ports:
      - "3000:3000"
    depends_on:
      core-api: { condition: service_started }

volumes:
  mysql_data:
